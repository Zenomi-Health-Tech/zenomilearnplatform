<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="zg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B2D8E"/>
      <stop offset="50%" stop-color="#A52D5E"/>
      <stop offset="100%" stop-color="#C42B4E"/>
    </linearGradient>
  </defs>
  <!-- Top bar of Z (purple end) -->
  <polygon points="8,10 34,10 30,18 8,18" fill="#7B2D8E"/>
  <!-- Diagonal of Z -->
  <polygon points="30,18 34,10 16,50 12,50" fill="url(#zg)"/>
  <!-- Bottom bar of Z (red end) -->
  <polygon points="12,50 38,50 38,42 16,42" fill="#C42B4E"/>
  <!-- I vertical bar -->
  <rect x="44" y="16" width="8" height="34" fill="#C42B4E"/>
